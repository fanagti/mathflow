<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Quest: Ultra Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            touch-action: manipulation; 
            background: #0f172a; 
            color: #1e293b;
        }

        .app-container {
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Glass Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        /* Numpad Styling */
        .numpad-btn {
            background: white;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 #e2e8f0;
        }
        .numpad-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #e2e8f0;
            background: #f8fafc;
        }

        /* Custom Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Modal Animation */
        .modal-enter { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .hidden-screen { display: none !important; }
    </style>
</head>
<body class="flex justify-center items-center">

    <div id="main-app" class="w-full sm:max-w-[420px] bg-slate-50 app-container overflow-hidden relative sm:rounded-[2.5rem] sm:border-8 sm:border-slate-800">
        
        <div id="game-header" class="hidden-screen p-6 bg-white border-b border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <button onclick="confirmExit()" class="text-slate-400 font-bold text-sm hover:text-rose-500 transition-colors">EXIT</button>
                <div class="text-center">
                    <p class="text-[10px] font-black text-slate-400 tracking-widest uppercase">Score</p>
                    <p id="score" class="text-3xl font-black text-indigo-600">0</p>
                </div>
                <div class="text-right">
                    <p id="high-score-label" class="text-[10px] font-black text-slate-300 tracking-widest uppercase">Best</p>
                    <p id="high-score" class="text-lg font-bold text-slate-400">0</p>
                </div>
            </div>
            <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                <div id="timer-bar" class="h-full bg-indigo-500 w-full transition-all duration-100"></div>
            </div>
        </div>

        <div id="menu-screen" class="flex-1 flex flex-col p-8 overflow-y-auto no-scrollbar">
            <div class="my-auto text-center">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-200 rotate-6">
                    <span class="text-white text-3xl font-black">M+</span>
                </div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter">MATH<span class="text-indigo-600">QUEST</span></h1>
                <p class="text-slate-400 text-sm mt-2 mb-10">Pilih tantanganmu hari ini</p>
                
                <div class="space-y-4">
                    <button onclick="startGame(1)" class="w-full p-6 bg-white rounded-3xl border-2 border-slate-100 hover:border-indigo-500 transition-all text-left flex justify-between items-center group">
                        <div>
                            <span class="block text-[10px] font-black text-indigo-400 uppercase">Level 01</span>
                            <span class="text-xl font-bold text-slate-700">Pemula</span>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all">→</div>
                    </button>

                    <button onclick="startGame(2)" class="w-full p-6 bg-white rounded-3xl border-2 border-slate-100 hover:border-indigo-500 transition-all text-left flex justify-between items-center group">
                        <div>
                            <span class="block text-[10px] font-black text-amber-400 uppercase">Level 02</span>
                            <span class="text-xl font-bold text-slate-700">Aljabar X</span>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all">→</div>
                    </button>
                    
                    <button onclick="startGame(3)" class="w-full p-6 bg-white rounded-3xl border-2 border-slate-100 hover:border-indigo-500 transition-all text-left flex justify-between items-center group">
                        <div>
                            <span class="block text-[10px] font-black text-rose-400 uppercase">Level 03</span>
                            <span class="text-xl font-bold text-slate-700">Expert</span>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-indigo-600 group-hover:text-white transition-all">→</div>
                    </button>
                </div>
            </div>
        </div>

        <div id="game-screen" class="flex-1 flex flex-col hidden-screen">
            <div class="flex-grow flex flex-col items-center justify-center p-4">
                <div class="text-center">
                    <div id="question" class="text-5xl sm:text-7xl font-black text-slate-800 tracking-tighter mb-4 animate-pulse">0 + 0</div>
                    <div class="flex flex-col items-center">
                        <div class="text-slate-200 text-3xl font-light mb-2">=</div>
                        <div id="user-input" class="text-6xl sm:text-7xl font-black text-indigo-600 h-20 flex items-center justify-center border-b-8 border-indigo-100 min-w-[120px]"></div>
                    </div>
                </div>
            </div>

            <div class="p-4 sm:p-6 bg-slate-100 border-t border-slate-200 rounded-t-[2.5rem]">
                <div class="grid grid-cols-3 gap-2 sm:gap-3 max-w-[320px] mx-auto">
                    <button onclick="press('1')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">1</button>
                    <button onclick="press('2')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">2</button>
                    <button onclick="press('3')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">3</button>
                    <button onclick="press('4')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">4</button>
                    <button onclick="press('5')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">5</button>
                    <button onclick="press('6')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">6</button>
                    <button onclick="press('7')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">7</button>
                    <button onclick="press('8')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">8</button>
                    <button onclick="press('9')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">9</button>
                    <button onclick="clearInp()" class="numpad-btn h-12 sm:h-14 bg-rose-50 text-rose-500 rounded-xl font-bold">C</button>
                    <button onclick="press('0')" class="numpad-btn h-12 sm:h-14 rounded-xl text-xl font-bold text-slate-700">0</button>
                    <button onclick="del()" class="numpad-btn h-12 sm:h-14 rounded-xl text-slate-400 font-bold">⌫</button>
                    
                    <button onclick="submit()" class="col-span-3 h-14 sm:h-16 bg-indigo-600 text-white rounded-2xl text-xl font-black shadow-lg shadow-indigo-200 active:scale-95 transition-all mt-2">
                        SUBMIT
                    </button>
                </div>
            </div>
        </div>

        <div id="modal-overlay" class="hidden-screen fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex justify-center items-center p-6">
            <div class="bg-white w-full max-w-[320px] rounded-[2.5rem] p-8 text-center modal-enter">
                <div id="modal-icon" class="text-5xl mb-4">🏆</div>
                <h2 id="modal-title" class="text-2xl font-black text-slate-800 mb-2">Game Over!</h2>
                <p id="modal-desc" class="text-slate-500 mb-6 text-sm">Skormu sangat luar biasa!</p>
                <button onclick="closeModal()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                    MAIN LAGI
                </button>
            </div>
        </div>

    </div>

    <script>
        let currentAns = 0, score = 0, currentInp = "", timeLeft = 100, timerInterval, currentModule = 1;
        const hs = () => localStorage.getItem('mq_ultra_best') || 0;

        // Elements
        const screens = { menu: q('#menu-screen'), game: q('#game-screen'), head: q('#game-header'), modal: q('#modal-overlay') };

        function q(id) { return document.getElementById(id.replace('#','')); }

        function startGame(level) {
            currentModule = level;
            score = 0; timeLeft = 100;
            q('#score').innerText = score;
            q('#high-score').innerText = hs();
            
            screens.menu.classList.add('hidden-screen');
            screens.game.classList.remove('hidden-screen');
            screens.head.classList.remove('hidden-screen');
            
            generateQuestion();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= (0.4 + (score/150));
                q('#timer-bar').style.width = timeLeft + "%";
                if(timeLeft <= 0) gameOver();
            }, 100);
        }

        function generateQuestion() {
            let n1 = r(1,10), n2 = r(1,10);
            if(currentModule === 1) {
                currentAns = n1 + n2;
                q('#question').innerHTML = `${n1} <span class="text-indigo-400">+</span> ${n2}`;
            } else if(currentModule === 2) {
                currentAns = r(1,10);
                q('#question').innerHTML = `x + ${n1} = ${n1 + currentAns}`;
            } else {
                n1 = r(2,5); currentAns = r(2,10);
                q('#question').innerHTML = `${n1}x = ${n1 * currentAns}`;
            }
            currentInp = ""; q('#user-input').innerText = "";
        }

        function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function press(num) { if(currentInp.length < 4) { currentInp += num; q('#user-input').innerText = currentInp; } }
        function del() { currentInp = currentInp.slice(0, -1); q('#user-input').innerText = currentInp; }
        function clearInp() { currentInp = ""; q('#user-input').innerText = ""; }

        function submit() {
            if(parseInt(currentInp) === currentAns) {
                score += 10;
                timeLeft = Math.min(timeLeft + 15, 100);
                q('#score').innerText = score;
                q('#user-input').classList.add('text-emerald-500');
                setTimeout(() => {
                    q('#user-input').classList.remove('text-emerald-500');
                    generateQuestion();
                }, 200);
            } else {
                q('#user-input').classList.add('text-rose-500');
                setTimeout(() => q('#user-input').classList.remove('text-rose-500'), 300);
                clearInp();
            }
        }

        function gameOver() {
            clearInterval(timerInterval);
            if(score > hs()) localStorage.setItem('mq_ultra_best', score);
            
            showModal("Time's Up!", `Skor Akhir: ${score}`, "⏰");
        }

        function showModal(title, desc, icon) {
            q('#modal-title').innerText = title;
            q('#modal-desc').innerText = desc;
            q('#modal-icon').innerText = icon;
            screens.modal.classList.remove('hidden-screen');
        }

        function closeModal() {
            screens.modal.classList.add('hidden-screen');
            location.reload();
        }

        function confirmExit() {
            if(confirm("Keluar dari permainan?")) location.reload();
        }
    </script>
</body>
</html>
