<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Quest: Moto Race Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            touch-action: manipulation; 
            background: #0f172a; 
            color: #1e293b; 
            overflow: hidden; 
        }

        .app-container { height: 100dvh; display: flex; flex-direction: column; }
        
        .numpad-btn { 
            background: white; 
            transition: all 0.1s ease; 
            box-shadow: 0 4px 0 #e2e8f0; 
        }
        
        .numpad-btn:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #e2e8f0; 
            background: #f8fafc; 
        }

        .hidden-screen { display: none !important; }
        
        .race-track {
            background: linear-gradient(90deg, #334155 0%, #1e293b 100%);
            position: relative;
            height: 80px;
            border-radius: 1rem;
            border: 2px solid #475569;
            overflow: hidden;
        }

        .finish-line {
            position: absolute;
            right: 10px;
            top: 0;
            bottom: 0;
            width: 12px;
            background-image: repeating-conic-gradient(#fff 0% 25%, #000 0% 50%);
            background-size: 6px 6px;
            opacity: 0.3;
        }

        .vehicle {
            position: absolute;
            transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 24px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        #timer-bar { transition: width 0.1s linear; }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        #custom-alert > div {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="flex justify-center items-center">

    <div id="main-app" class="w-full sm:max-w-[420px] bg-slate-50 app-container overflow-hidden relative sm:rounded-[2.5rem] sm:border-8 sm:border-slate-800 shadow-2xl">
        
        <div id="game-header" class="hidden-screen p-4 bg-white border-b border-slate-100 z-10">
            <div class="flex justify-between items-center mb-2 px-2">
                <button onclick="location.reload()" class="text-slate-400 font-black text-[10px] tracking-widest uppercase">Esc</button>
                <div id="timer-text" class="text-indigo-600 font-black text-sm uppercase italic">Gaspol!</div>
            </div>
            
            <div class="race-track p-2 mb-3">
                <div class="finish-line"></div>
                <div id="p1-rider" class="vehicle top-2 left-0" style="left: 0%">
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] font-bold text-blue-400 leading-none">P1</span>
                        <span id="p1-icon">🏍️</span>
                    </div>
                </div>
                <div id="p2-rider" class="vehicle bottom-1 left-0 hidden" style="left: 0%">
                    <div class="flex flex-col items-center">
                        <span class="text-[10px] font-bold text-rose-400 leading-none">P2</span>
                        <span id="p2-icon">🏎️</span>
                    </div>
                </div>
                <div class="absolute top-1/2 left-0 right-0 h-[1px] border-t border-dashed border-slate-500 opacity-50"></div>
            </div>

            <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                <div id="timer-bar" class="h-full bg-indigo-500 w-full"></div>
            </div>
        </div>

        <div id="menu-screen" class="flex-1 flex flex-col p-8 overflow-y-auto">
            <div class="my-auto text-center">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl rotate-6">
                    <span class="text-white text-3xl font-black italic">GO!</span>
                </div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter mb-8 italic">MATH<span class="text-indigo-600">RACER</span></h1>

                <div class="space-y-3">
                    <button onclick="selectLevelMenu(0)" class="w-full p-4 bg-white rounded-2xl border-2 border-slate-100 hover:border-sky-500 flex justify-between items-center group transition-all shadow-sm">
                        <div class="text-left"><span class="block text-[10px] font-black text-sky-400 uppercase">Stage 00</span><span class="font-bold text-slate-700">STARTER: Dasar (+/-)</span></div>
                        <span class="text-2xl group-hover:translate-x-1 transition-transform">🛴</span>
                    </button>
                    <button onclick="selectLevelMenu(1)" class="w-full p-4 bg-white rounded-2xl border-2 border-slate-100 hover:border-indigo-500 flex justify-between items-center group transition-all shadow-sm">
                        <div class="text-left"><span class="block text-[10px] font-black text-indigo-400 uppercase">Stage 01</span><span class="font-bold text-slate-700">KART: Campuran 1-10</span></div>
                        <span class="text-2xl group-hover:translate-x-1 transition-transform">🚲</span>
                    </button>
                    <button onclick="selectLevelMenu(2)" class="w-full p-4 bg-white rounded-2xl border-2 border-slate-100 hover:border-amber-500 flex justify-between items-center group transition-all shadow-sm">
                        <div class="text-left"><span class="block text-[10px] font-black text-amber-400 uppercase">Stage 02</span><span class="font-bold text-slate-700">DRIFT: Aljabar X</span></div>
                        <span class="text-2xl group-hover:translate-x-1 transition-transform">🏍️</span>
                    </button>
                    <button onclick="selectLevelMenu(3)" class="w-full p-4 bg-white rounded-2xl border-2 border-slate-100 hover:border-rose-500 flex justify-between items-center group transition-all shadow-sm">
                        <div class="text-left"><span class="block text-[10px] font-black text-rose-400 uppercase">Stage 03</span><span class="font-bold text-slate-700 italic">RALLY: Menengah</span></div>
                        <span class="text-2xl group-hover:translate-x-1 transition-transform">🏎️</span>
                    </button>
                    <button onclick="selectLevelMenu(4)" class="w-full p-4 bg-white rounded-2xl border-2 border-slate-100 hover:border-emerald-500 flex justify-between items-center group transition-all shadow-sm">
                        <div class="text-left"><span class="block text-[10px] font-black text-emerald-400 uppercase">Stage 04</span><span class="font-bold text-emerald-600 italic font-black">F1: Expert Aljabar</span></div>
                        <span class="text-2xl group-hover:translate-x-1 transition-transform">🚀</span>
                    </button>
                </div>

                <div class="mt-8 pt-8 border-t border-slate-100">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-3 text-center">Join Race by Code</p>
                    <div class="flex gap-2">
                        <input id="room-input" type="number" placeholder="Code" class="w-24 px-4 py-3 rounded-xl bg-slate-100 font-bold text-center outline-none">
                        <button onclick="joinGame()" class="flex-1 bg-slate-800 text-white rounded-xl font-bold">JOIN LOBBY</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="level-modal" class="hidden-screen fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-[320px] rounded-[2.5rem] p-8 text-center shadow-2xl transform scale-100">
                <h2 id="selected-level-title" class="text-2xl font-black text-slate-800 mb-6 italic uppercase">READY?</h2>
                <div class="space-y-3">
                    <button onclick="startAction('solo')" class="w-full py-4 bg-slate-100 text-slate-700 rounded-2xl font-black hover:bg-slate-200 transition-colors">SINGLE PLAYER</button>
                    <button onclick="startAction('multi')" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-200">MULTIPLAYER (1VS1)</button>
                    <button onclick="q('#level-modal').classList.add('hidden-screen')" class="w-full py-2 text-slate-400 font-bold text-xs uppercase mt-2">CANCEL</button>
                </div>
            </div>
        </div>

        <div id="waiting-screen" class="hidden-screen flex-1 flex flex-col p-8 text-center justify-center">
            <h2 class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.3em] mb-4 text-center">Lobby ID</h2>
            <div class="text-6xl font-black text-slate-800 mb-8" id="display-room-id">0000</div>
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-bold text-slate-400 italic">WAITING FOR OPPONENT...</p>
            </div>
            <button onclick="location.reload()" class="mt-12 text-rose-500 font-bold text-xs uppercase">Exit Lobby</button>
        </div>

        <div id="game-screen" class="hidden-screen flex-1 flex flex-col">
            <div class="flex-grow flex flex-col items-center justify-center p-4">
                <div id="question" class="text-5xl sm:text-6xl font-black text-slate-800 mb-4 tracking-tighter italic">x + 0 = 0</div>
                <div id="user-input" class="text-6xl font-black text-indigo-600 h-20 border-b-8 border-indigo-100 min-w-[140px] flex justify-center items-center"></div>
            </div>
            
            <div class="p-6 bg-slate-100 border-t rounded-t-[2.5rem] shadow-inner">
                <div class="grid grid-cols-3 gap-3 max-w-[320px] mx-auto">
                    <button onclick="press('1')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">1</button>
                    <button onclick="press('2')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">2</button>
                    <button onclick="press('3')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">3</button>
                    <button onclick="press('4')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">4</button>
                    <button onclick="press('5')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">5</button>
                    <button onclick="press('6')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">6</button>
                    <button onclick="press('7')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">7</button>
                    <button onclick="press('8')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">8</button>
                    <button onclick="press('9')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">9</button>
                    <button onclick="clearInp()" class="numpad-btn h-14 bg-rose-50 text-rose-500 rounded-xl font-bold">C</button>
                    <button onclick="press('0')" class="numpad-btn h-14 rounded-xl text-xl font-bold text-slate-700">0</button>
                    <button onclick="del()" class="numpad-btn h-14 rounded-xl text-slate-400 font-bold">⌫</button>
                    <button onclick="submitAns()" class="col-span-3 h-16 bg-indigo-600 text-white rounded-2xl text-xl font-black shadow-lg mt-2 active:scale-95 transition-all">SUBMIT ANS</button>
                </div>
            </div>
        </div>

        <div id="custom-alert" class="hidden-screen fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-[320px] rounded-[3rem] p-8 text-center shadow-2xl border-b-8 border-slate-200">
                <div id="alert-icon" class="text-6xl mb-4">🏆</div>
                <h2 id="alert-title" class="text-3xl font-black text-slate-800 mb-2 italic uppercase">YOU WIN!</h2>
                <p id="alert-msg" class="text-slate-500 font-bold mb-8 text-center">Balapan luar biasa!</p>
                <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-200 uppercase">Main Lagi</button>
            </div>
        </div>

    </div>

    <script>
        // === FIREBASE CONFIG ===
        const firebaseConfig = {
            apiKey: "AIzaSyAYyotrlpW62rjE31ar-yMRWFy4ggGw-Ho",
            authDomain: "mathquest-multiplayer.firebaseapp.com",
            databaseURL: "https://mathquest-multiplayer-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mathquest-multiplayer",
            storageBucket: "mathquest-multiplayer.firebasestorage.app",
            messagingSenderId: "403608325959",
            appId: "1:403608325959:web:683df0409500156b810662"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentAns, score = 0, currentInp = "", timeLeft = 100, timerInterval, currentModule = 0;
        let isMultiplayer = false, roomId = null, playerRole = null;
        const TARGET_SCORE = 200; 

        const q = (id) => document.getElementById(id.replace('#', ''));

        function selectLevelMenu(lvl) {
            currentModule = lvl;
            const titles = ["STAGE 00: STARTER", "STAGE 01: KART", "STAGE 02: DRIFT", "STAGE 03: RALLY", "STAGE 04: F1"];
            q('#selected-level-title').innerText = titles[lvl];
            q('#level-modal').classList.remove('hidden-screen');
        }

        function startAction(mode) {
            q('#level-modal').classList.add('hidden-screen');
            if (mode === 'solo') {
                isMultiplayer = false;
                setupUI('game');
                generateQuestion();
                startTimer();
            } else {
                findMatch();
            }
        }

        function findMatch() {
            setupUI('waiting');
            db.ref('rooms').once('value', (snap) => {
                let foundId = null;
                const rooms = snap.val();
                if (rooms) {
                    for (let id in rooms) {
                        if (rooms[id].status === 'waiting' && rooms[id].level === currentModule) {
                            foundId = id; break;
                        }
                    }
                }
                if (foundId) joinExistingRoom(foundId);
                else createNewRoom();
            });
        }

        function createNewRoom() {
            roomId = Math.floor(1000 + Math.random() * 8999);
            playerRole = 'p1'; isMultiplayer = true;
            q('#display-room-id').innerText = roomId;
            db.ref('rooms/' + roomId).set({
                status: 'waiting', level: currentModule,
                p1_score: 0, p2_score: 0,
                question: "Wait...", answer: 0
            });
            db.ref('rooms/' + roomId).onDisconnect().remove();
            listenRoom();
        }

        function joinExistingRoom(id) {
            roomId = id; playerRole = 'p2'; isMultiplayer = true;
            db.ref('rooms/' + roomId).update({ status: 'playing' });
            setupUI('game');
            listenRoom();
        }

        function joinGame() {
            const inputId = q('#room-input').value;
            if(!inputId) return;
            roomId = inputId; playerRole = 'p2'; isMultiplayer = true;
            db.ref('rooms/' + roomId).get().then(s => {
                if(s.exists()) {
                    db.ref('rooms/' + roomId).update({ status: 'playing' });
                    setupUI('game'); listenRoom();
                }
            });
        }

        function listenRoom() {
            db.ref('rooms/' + roomId).on('value', (s) => {
                const d = s.val();
                if (!d) return;
                updateRaceTrack(d.p1_score || 0, d.p2_score || 0);
                if (d.status === 'playing') {
                    setupUI('game');
                    currentAns = d.answer;
                    q('#question').innerText = d.question;
                    if (!timerInterval) startTimer();
                }
            });
        }

        function updateRaceTrack(p1, p2) {
            const p1Pos = Math.min((p1 / TARGET_SCORE) * 85, 85);
            const p2Pos = Math.min((p2 / TARGET_SCORE) * 85, 85);
            q('#p1-rider').style.left = p1Pos + "%";
            if (isMultiplayer) {
                q('#p2-rider').classList.remove('hidden');
                q('#p2-rider').style.left = p2Pos + "%";
            }
        }

        function generateQuestion() {
            let ques, ans;
            const opType = Math.floor(Math.random() * 4);

            if (currentModule === 0) {
                // LEVEL 0: STARTER (Hanya + dan - angka 1-5)
                let n1 = Math.floor(Math.random() * 5) + 1;
                let n2 = Math.floor(Math.random() * 5) + 1;
                if (Math.random() > 0.5) { ans = n1 + n2; ques = `${n1} + ${n2}`; }
                else { let m = Math.max(n1,n2), s = Math.min(n1,n2); ans = m-s; ques = `${m} - ${s}`; }
            } 
            else if (currentModule === 1) {
                // LEVEL 1: Dasar Campuran
                let n1 = Math.floor(Math.random() * 10) + 1;
                let n2 = Math.floor(Math.random() * 10) + 1;
                if (opType === 0) { ans = n1 + n2; ques = `${n1} + ${n2}`; }
                else if (opType === 1) { let m = Math.max(n1,n2), s = Math.min(n1,n2); ans = m-s; ques = `${m} - ${s}`; }
                else if (opType === 2) { n1 = Math.floor(Math.random()*5)+1; ans = n1*2; ques = `${n1} x 2`; }
                else { ans = Math.floor(Math.random()*5)+1; ques = `${ans*2} : 2`; }
            } 
            else if (currentModule === 2) {
                // LEVEL 2: Aljabar Dasar
                let n1 = Math.floor(Math.random() * 15) + 2;
                ans = Math.floor(Math.random() * 10) + 1;
                if (opType === 0) { ques = `x + ${n1} = ${ans + n1}`; }
                else if (opType === 1) { ques = `x - ${n1} = ${ans}`; ans = ans + n1; }
                else if (opType === 2) { n1 = Math.floor(Math.random()*5)+2; ques = `${n1}x = ${n1*ans}`; }
                else { n1 = Math.floor(Math.random()*5)+2; ques = `x : ${n1} = ${ans}`; ans = ans * n1; }
            } 
            else if (currentModule === 3) {
                // LEVEL 3: Menengah
                let n1 = Math.floor(Math.random() * 40) + 10;
                ans = Math.floor(Math.random() * 20) + 5;
                if (opType === 0) { ques = `${n1} + x = ${n1 + ans}`; }
                else if (opType === 1) { ques = `${n1 + ans} - x = ${n1}`; }
                else if (opType === 2) { n1 = Math.floor(Math.random()*12)+2; ques = `${n1}x = ${n1*ans}`; }
                else { n1 = Math.floor(Math.random()*10)+2; ques = `x : ${n1} = ${ans}`; ans = ans * n1; }
            } 
            else {
                // LEVEL 4: Expert
                let n1 = Math.floor(Math.random() * 100) + 20;
                ans = Math.floor(Math.random() * 50) + 10;
                if (opType === 0) { ques = `x + ${n1} = ${ans + n1}`; }
                else if (opType === 1) { ques = `${n1 + ans} - x = ${ans}`; ans = n1; }
                else if (opType === 2) { n1 = Math.floor(Math.random()*20)+5; ques = `${n1}x = ${n1*ans}`; }
                else { n1 = Math.floor(Math.random()*15)+2; ques = `x : ${n1} = ${ans}`; ans = ans * n1; }
            }

            if (isMultiplayer) db.ref('rooms/' + roomId).update({ question: ques, answer: ans });
            else { currentAns = ans; q('#question').innerText = ques; }
        }

        function submitAns() {
            if (parseInt(currentInp) === currentAns) {
                score += 10;
                timeLeft = Math.min(timeLeft + 8, 100); 
                if (isMultiplayer) {
                    let up = {}; up[playerRole + '_score'] = score;
                    db.ref('rooms/' + roomId).update(up);
                    generateQuestion(); 
                } else { updateRaceTrack(score, 0); generateQuestion(); }
                clearInp();
            } else {
                q('#user-input').classList.add('text-rose-500', 'shake');
                setTimeout(() => { q('#user-input').classList.remove('text-rose-500', 'shake'); clearInp(); }, 400);
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= (0.4 + (score / 200));
                q('#timer-bar').style.width = timeLeft + "%";
                if (timeLeft <= 30) q('#timer-bar').classList.replace('bg-indigo-500', 'bg-rose-500');
                else q('#timer-bar').classList.replace('bg-rose-500', 'bg-indigo-500');
                if (timeLeft <= 0) handleGameOver();
            }, 100);
            if (!isMultiplayer || playerRole === 'p1') generateQuestion();
        }

        function handleGameOver() {
            clearInterval(timerInterval);
            const modal = q('#custom-alert'), title = q('#alert-title'), msg = q('#alert-msg'), icon = q('#alert-icon');
            if (isMultiplayer) {
                db.ref('rooms/' + roomId).once('value', (s) => {
                    const d = s.val();
                    const s1 = d.p1_score, s2 = d.p2_score;
                    let my = playerRole === 'p1' ? s1 : s2, op = playerRole === 'p1' ? s2 : s1;
                    if (my > op) { title.innerText = "YOU WIN!"; icon.innerText = "🏆"; msg.innerText = `Skor ${my} vs ${op}. Kamu juara!`; }
                    else if (my < op) { title.innerText = "DEFEAT!"; icon.innerText = "💀"; msg.innerText = `Skor ${my} vs ${op}. Lawan lebih cepat!`; }
                    else { title.innerText = "DRAW!"; icon.innerText = "🤝"; msg.innerText = "Seri! Balapan yang sengit."; }
                    db.ref('rooms/' + roomId).remove();
                });
            } else { title.innerText = "FINISH!"; icon.innerText = "🏁"; msg.innerText = `Waktu habis! Skor akhir: ${score}`; }
            modal.classList.remove('hidden-screen');
        }

        function setupUI(screen) {
            ['#menu-screen', '#waiting-screen', '#game-screen', '#game-header'].forEach(id => q(id).classList.add('hidden-screen'));
            if (screen === 'waiting') q('#waiting-screen').classList.remove('hidden-screen');
            if (screen === 'game') { q('#game-screen').classList.remove('hidden-screen'); q('#game-header').classList.remove('hidden-screen'); }
        }

        function press(n) { if (currentInp.length < 5) { currentInp += n; q('#user-input').innerText = currentInp; } }
        function del() { currentInp = currentInp.slice(0, -1); q('#user-input').innerText = currentInp; }
        function clearInp() { currentInp = ""; q('#user-input').innerText = ""; }
    </script>
</body>
</html>
