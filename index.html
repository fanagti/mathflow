<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Master Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            touch-action: manipulation;
            background: radial-gradient(circle at top left, #1e293b, #0f172a); /* Background Desktop */
        }

        .numpad-btn { 
            transition: all 0.1s ease; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        .numpad-btn:active { 
            transform: scale(0.92); 
            filter: brightness(0.9);
        }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Responsive Height Fix */
        .app-height {
            height: 100vh;
            height: 100dvh;
        }

        /* Ukuran Font Dinamis agar tidak pecah di layar kecil */
        .dynamic-text-question {
            font-size: clamp(3rem, 15vw, 5rem);
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen overflow-hidden">

    <div class="w-full sm:max-w-[420px] sm:h-[850px] sm:rounded-[3rem] sm:border-[12px] sm:border-slate-800 sm:shadow-2xl bg-white app-height flex flex-col overflow-hidden relative transition-all duration-500">
        
        <div class="bg-slate-800 p-6 pt-10 sm:pt-6 text-white flex justify-between items-end border-b border-slate-700">
            <div>
                <p class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold mb-1">Total Score</p>
                <p id="score" class="text-3xl font-black text-yellow-400 leading-none">0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold mb-1">Streak</p>
                <div class="flex items-center gap-1 justify-end leading-none">
                    <span class="text-orange-500 font-bold">🔥</span>
                    <p id="streak" class="text-3xl font-black text-orange-500">0</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center p-6 text-center">
            <div id="question-box" class="w-full">
                <div id="question" class="dynamic-text-question font-black text-slate-800 mb-2 tracking-tighter leading-tight">
                    -- + --
                </div>
                <div class="flex flex-col items-center">
                    <div class="text-slate-200 font-black text-3xl mb-1">=</div>
                    <div id="user-input" class="dynamic-text-question font-black text-blue-600 h-24 flex items-center justify-center border-b-[6px] border-blue-100 min-w-[150px] px-4 transition-all duration-100">
                        </div>
                </div>
            </div>
            <div id="feedback" class="h-8 mt-6 font-black text-xs sm:text-sm uppercase tracking-[0.3em] transition-colors duration-200"></div>
        </div>

        <div class="bg-slate-50 p-4 sm:p-6 pb-10 sm:pb-8 border-t border-slate-200 sm:rounded-t-[3rem] shadow-[0_-10px_40px_rgba(0,0,0,0.04)]">
            <div class="grid grid-cols-3 gap-3">
                <template id="btn-template">
                    <button class="numpad-btn h-14 sm:h-16 bg-white border-b-4 border-slate-200 rounded-2xl text-2xl font-bold text-slate-700 hover:bg-slate-50"></button>
                </template>

                <div id="numpad-grid" class="contents"></div>

                <button onclick="clearInp()" class="numpad-btn h-14 sm:h-16 bg-red-50 border-b-4 border-red-200 text-red-500 rounded-2xl font-black">C</button>
                <button onclick="press('0')" class="numpad-btn h-14 sm:h-16 bg-white border-b-4 border-slate-200 rounded-2xl text-2xl font-bold text-slate-700">0</button>
                <button onclick="del()" class="numpad-btn h-14 sm:h-16 bg-slate-200 border-b-4 border-slate-300 text-slate-600 rounded-2xl text-2xl">⌫</button>
                
                <button onclick="submit()" class="numpad-btn col-span-3 h-16 sm:h-20 bg-blue-600 border-b-4 border-blue-800 text-white rounded-2xl text-xl sm:text-2xl font-black shadow-lg shadow-blue-200 mt-2 flex items-center justify-center gap-2">
                    SUBMIT
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentAns = 0;
        let score = 0;
        let streak = 0;
        let currentInp = "";

        // Elements
        const qElem = document.getElementById('question');
        const iElem = document.getElementById('user-input');
        const sElem = document.getElementById('score');
        const stElem = document.getElementById('streak');
        const fElem = document.getElementById('feedback');
        const qBox = document.getElementById('question-box');
        const grid = document.getElementById('numpad-grid');

        // Render Numpad 1-9
        for(let i=1; i<=9; i++) {
            const btn = document.createElement('button');
            btn.className = "numpad-btn h-14 sm:h-16 bg-white border-b-4 border-slate-200 rounded-2xl text-2xl font-bold text-slate-700 active:bg-slate-100";
            btn.innerText = i;
            btn.onclick = () => press(i.toString());
            grid.appendChild(btn);
        }

        function generateQuestion() {
            const ops = ['+', '-', '*', '/'];
            const op = ops[Math.floor(Math.random() * ops.length)];
            let n1, n2;

            if (op === '+') {
                n1 = Math.floor(Math.random() * 11);
                n2 = Math.floor(Math.random() * 11);
                currentAns = n1 + n2;
                qElem.innerHTML = `${n1} <span class="text-blue-500">+</span> ${n2}`;
            } else if (op === '-') {
                n1 = Math.floor(Math.random() * 11);
                n2 = Math.floor(Math.random() * (n1 + 1));
                currentAns = n1 - n2;
                qElem.innerHTML = `${n1} <span class="text-rose-500">-</span> ${n2}`;
            } else if (op === '*') {
                n1 = Math.floor(Math.random() * 10) + 1;
                n2 = Math.floor(Math.random() * 10) + 1;
                currentAns = n1 * n2;
                qElem.innerHTML = `${n1} <span class="text-amber-500">&times;</span> ${n2}`;
            } else {
                let res = Math.floor(Math.random() * 10) + 1;
                n2 = Math.floor(Math.random() * 9) + 1;
                n1 = res * n2;
                currentAns = res;
                qElem.innerHTML = `${n1} <span class="text-indigo-600">&divide;</span> ${n2}`;
            }
            
            clearInp();
            fElem.innerText = "";
        }

        function press(num) {
            if (currentInp.length < 4) {
                currentInp += num;
                iElem.innerText = currentInp;
            }
        }

        function del() {
            currentInp = currentInp.slice(0, -1);
            iElem.innerText = currentInp;
        }

        function clearInp() {
            currentInp = "";
            iElem.innerText = "";
        }

        function submit() {
            if (currentInp === "") return;

            if (parseInt(currentInp) === currentAns) {
                score += (10 + streak);
                streak++;
                fElem.innerText = "EXCELLENT! +"+ (10 + streak - 1);
                fElem.className = "h-8 mt-6 font-black text-xs sm:text-sm uppercase tracking-[0.3em] text-green-500";
                
                sElem.innerText = score;
                stElem.innerText = streak;
                
                qBox.classList.add('scale-90', 'opacity-50');
                setTimeout(() => {
                    qBox.classList.remove('scale-90', 'opacity-50');
                    generateQuestion();
                }, 300);
            } else {
                streak = 0;
                stElem.innerText = "0";
                fElem.innerText = "WRONG! TRY AGAIN";
                fElem.className = "h-8 mt-6 font-black text-xs sm:text-sm uppercase tracking-[0.3em] text-red-500";
                qBox.classList.add('shake');
                setTimeout(() => qBox.classList.remove('shake'), 400);
                clearInp();
            }
        }

        generateQuestion();
    </script>
</body>
</html>
